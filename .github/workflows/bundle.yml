name: Build and Upload Core Bundle or cardano-connect.js to GitHub Pages

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      target:
        description: 'Target library'
        required: true
        default: 'both'
        type: choice
        options:
          - react
          - core
          - both

jobs:
  upload-core-bundle:
    if: "(github.event_name == 'push' && contains(github.event.head_commit.message, 'release-please--branches--main--components--cardano-connect-with-wallet-core')) || (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'core' || github.event.inputs.target == 'both'))"
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          registry-url: https://registry.npmjs.org
          cache: 'npm'

      - name: 🧘‍♀️ Download dependencies
        run: npm ci

      - name: 📦 Make bundle
        run: npm run bundle:core

      - name: 👀 Lookup version
        run: |
          echo "VERSION=$(sed -n 's/.*\"version\": *\"\([^\"]*\)\".*/\1/p' core/package.json)" >> $GITHUB_ENV

      - name: 🎨 Create bundle folder
        run: mkdir -p core/bundle-${{ env.VERSION }}

      - name: 💃🏻 Move files into the bundle folder
        run: |
          mv core/dist/index.js core/bundle-${{ env.VERSION }}/index.js
          mv core/dist/index.js.map core/bundle-${{ env.VERSION }}/index.js.map

      - name: 📅 Publish latest bundle on gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          BRANCH: gh-pages
          folder: core/bundle-${{ env.VERSION }}
          target-folder: bundle-latest/

      - name: 🥁 Publish bundle with version on gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          BRANCH: gh-pages
          folder: core/bundle-${{ env.VERSION }}
          target-folder: bundle-${{ env.VERSION }}/
  upload-cardano-connect-js:
    if: "(github.event_name == 'push' && contains(github.event.head_commit.message, 'release-please--branches--main--components--cardano-connect-js')) || (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'react' || github.event.inputs.target == 'both'))"
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          registry-url: https://registry.npmjs.org
          cache: 'npm'

      - name: 🧘‍♀️ Download dependencies
        run: npm ci

      - name: 📦 Make bundle
        run: npm run bundle:html

      - name: 👀 Lookup version
        run: |
          echo "VERSION=$(cat html/version.txt)" >> $GITHUB_ENV

      - name: 📅 Publish latest cardano-connect-js lib on gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          BRANCH: gh-pages
          folder: html
          target-folder: cardano-connect-latest/

      - name: 🥁 Publish bundle with version on gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          BRANCH: gh-pages
          folder: html
          target-folder: cardano-connect-${{ env.VERSION }}/
