name: Upload React Storybook to GitHub Pages

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  upload-react-storybook:
    if: "(github.event_name == 'workflow_dispatch' || (contains(github.event.head_commit.message, 'release-please--branches--main--components--cardano-connect-with-wallet') && !contains(github.event.head_commit.message, 'cardano-connect-with-wallet-core')))"
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          registry-url: https://registry.npmjs.org
          cache: 'npm'

      - name: 🧘‍♀️ Download dependencies
        run: npm ci

      - name: 🎨 Create public folder
        run: mkdir -p react/public

      - name: 🧚‍♀️ Build storybook
        run: npm run build:react

      - name: 🥁 Publish storybook into gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          BRANCH: gh-pages
          folder: react/storybook-static
          target-folder: react-storybook/
